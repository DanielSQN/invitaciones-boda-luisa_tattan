<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220" viewBox="0 0 220 220">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 .08"/>
    </feComponentTransfer>
  </filter>
  <rect width="220" height="220" fill="#f7f2e8"/>
  <rect width="220" height="220" filter="url(#grain)" opacity=".65"/>
</svg>
